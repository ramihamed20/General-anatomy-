<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>General Anatomy — Study App</title>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#080d14"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #080d14;
  --surface: #0f1620;
  --surface2: #161f2e;
  --surface3: #1c2840;
  --border: #1e2d45;
  --border2: #243550;
  --text: #e4eaf5;
  --text2: #a8b8d8;
  --muted: #5a6e8f;
  --accent: #3d8ef0;
  --accent-glow: rgba(61,142,240,0.18);
  --accent2: #30d4a0;
  --accent2-glow: rgba(48,212,160,0.15);
  --red: #f06060;
  --green: #30d4a0;
  --yellow: #f0c030;
  --card-h: clamp(210px, 52vw, 330px);
  --radius: 14px;
  --radius-sm: 10px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.6);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  display: flex;
  flex-direction: column;
  height: 100dvh;
  padding-bottom: env(safe-area-inset-bottom);
}
html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
button, [role="button"] { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: linear-gradient(rgba(61,142,240,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(61,142,240,0.025) 1px, transparent 1px);
  background-size: 32px 32px;
  pointer-events: none;
  z-index: 0;
}
.topbar, .main, .bottomnav { position: relative; z-index: 1; }

.topbar {
  background: linear-gradient(180deg, #0d1624 0%, #0a1220 100%);
  border-bottom: 1px solid var(--border2);
  padding: max(14px, env(safe-area-inset-top)) 18px 12px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
  box-shadow: 0 2px 16px rgba(0,0,0,0.3);
}
.topbar h1 {
  font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; letter-spacing: -0.5px;
  background: linear-gradient(135deg, var(--text) 0%, var(--text2) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.topbar h1 span {
  background: linear-gradient(135deg, var(--accent) 0%, #60b4ff 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.badge {
  font-size: 10px;
  background: linear-gradient(135deg, var(--accent) 0%, #2a7de0 100%);
  color: #fff; padding: 4px 10px; border-radius: 20px; font-weight: 700;
  letter-spacing: 0.3px; box-shadow: 0 2px 8px rgba(61,142,240,0.3);
}

.main { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; scroll-behavior: smooth; overscroll-behavior: contain; }
.section { display: none; padding: 14px 14px 96px; animation: fadeSlideUp 0.25s ease; }
.section.active { display: flex; flex-direction: column; }

.bottomnav {
  display: flex;
  background: linear-gradient(180deg, #0a1220 0%, #080d14 100%);
  border-top: 1px solid var(--border2);
  flex-shrink: 0;
  padding-bottom: env(safe-area-inset-bottom);
  box-shadow: 0 -2px 16px rgba(0,0,0,0.25);
}
.navbtn {
  flex: 1; padding: 12px 8px; background: none; border: none; color: var(--muted);
  font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 600; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  transition: color 0.2s, transform 0.15s; min-height: 52px; letter-spacing: 0.2px;
}
.navbtn.active { color: var(--accent); }
.navbtn.active svg { filter: drop-shadow(0 0 4px rgba(61,142,240,0.5)); }
.navbtn:active { opacity: 0.7; }
.navbtn svg { width: 22px; height: 22px; }

/* ── SHEET TABS ── */
.sheet-tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin-bottom: 14px; }
.sheet-tab {
  flex: 1; padding: 11px 8px; border-radius: var(--radius-sm);
  border: 1px solid var(--border2); background: var(--surface);
  color: var(--text2); font-size: 12px; font-weight: 700; cursor: pointer;
  font-family: 'DM Sans', sans-serif; transition: all 0.2s; text-align: center;
  min-height: 44px; letter-spacing: 0.1px;
}
.sheet-tab:active { transform: scale(0.97); }
.sheet-tab.active {
  background: linear-gradient(135deg, var(--accent) 0%, #2a7de0 100%);
  border-color: var(--accent); color: #fff;
  box-shadow: 0 3px 14px rgba(61,142,240,0.35);
}

/* ── FILTER TABS ── */
.filter-row {
  display: flex; gap: 7px; margin-bottom: 16px;
  overflow-x: auto; padding: 2px 0 8px;
  scrollbar-width: none; -webkit-overflow-scrolling: touch;
  scroll-snap-type: x proximity;
}
.filter-row::-webkit-scrollbar { display: none; }
.filter-btn {
  flex-shrink: 0; padding: 8px 14px; border-radius: 22px;
  border: 1px solid var(--border2); background: var(--surface);
  color: var(--text2); font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all 0.18s; font-family: 'DM Sans', sans-serif;
  min-height: 38px; scroll-snap-align: start; letter-spacing: 0.1px;
}
.filter-btn:active { transform: scale(0.95); }
.filter-btn.active {
  background: linear-gradient(135deg, var(--accent) 0%, #2a7de0 100%);
  border-color: var(--accent); color: #fff;
  box-shadow: 0 2px 12px rgba(61,142,240,0.35);
}

/* ── FLASH CARD ── */
.fc-counter { text-align: center; font-size: 12px; color: var(--muted); margin-bottom: 12px; font-weight: 500; letter-spacing: 0.3px; }
.fc-counter strong { color: var(--accent); }
.fc-scene {
  width: 100%; height: var(--card-h); perspective: 1000px; -webkit-perspective: 1000px;
  cursor: pointer; margin-bottom: 14px; touch-action: manipulation;
  transition: opacity 0.1s, transform 0.1s; will-change: auto;
  user-select: none; -webkit-user-select: none;
}
.fc-scene:active { opacity: 0.92; transform: scale(0.995); }
.fc-card {
  width: 100%; height: 100%; position: relative;
  transform-style: preserve-3d; -webkit-transform-style: preserve-3d;
  transition: transform 0.42s cubic-bezier(0.35, 0, 0.25, 1); will-change: transform;
}
.fc-card.flipped { transform: rotateY(180deg); }
.fc-front, .fc-back {
  position: absolute; inset: 0; border-radius: 16px; padding: 24px 22px;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  backface-visibility: hidden; -webkit-backface-visibility: hidden;
}
.fc-front {
  background: linear-gradient(160deg, var(--surface) 0%, var(--surface2) 100%);
  border: 1px solid var(--border2); box-shadow: var(--shadow);
}
.fc-back {
  background: linear-gradient(160deg, #0e1e36 0%, #112240 100%);
  border: 1px solid rgba(61,142,240,0.25);
  box-shadow: var(--shadow), 0 0 30px rgba(61,142,240,0.06);
  transform: rotateY(180deg);
}
.fc-tag {
  font-size: 9px; letter-spacing: 1.2px; background: var(--accent-glow);
  border: 1px solid rgba(61,142,240,0.2); color: var(--accent);
  padding: 4px 10px; border-radius: 12px; align-self: flex-start;
  text-transform: uppercase; font-weight: 700; margin-bottom: 14px;
}
.fc-question {
  font-size: clamp(14px, 3.8vw, 17px); line-height: 1.6; color: var(--text);
  font-weight: 400; text-align: center;
  overflow-y: auto; max-height: 180px; -webkit-overflow-scrolling: touch;
  word-break: break-word; hyphens: auto;
}
.fc-tap-hint { font-size: 11px; color: var(--muted); margin-top: 16px; display: flex; align-items: center; gap: 5px; }
.fc-answer {
  font-size: clamp(13px, 3.6vw, 16px); line-height: 1.65; color: var(--accent2);
  font-weight: 500; text-align: center;
  overflow-y: auto; max-height: 180px; -webkit-overflow-scrolling: touch;
  word-break: break-word; hyphens: auto;
}
.fc-answer-label { font-size: 9px; letter-spacing: 1.2px; color: var(--accent2); text-transform: uppercase; font-weight: 700; margin-bottom: 12px; opacity: 0.7; }

.fc-controls { display: flex; gap: 10px; justify-content: center; margin-bottom: 14px; }
.fc-btn {
  flex: 1; max-width: 130px; padding: 12px; border-radius: var(--radius-sm);
  border: 1px solid var(--border2); background: var(--surface); color: var(--text);
  font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.18s;
  font-family: 'DM Sans', sans-serif; display: flex; align-items: center;
  justify-content: center; gap: 6px; min-height: 48px;
}
.fc-btn:active { transform: scale(0.96); }
.fc-btn:hover { background: var(--surface2); border-color: var(--accent); }
.fc-btn.primary {
  background: linear-gradient(135deg, var(--accent) 0%, #2a7de0 100%);
  border-color: transparent; box-shadow: 0 3px 14px rgba(61,142,240,0.35);
}
.fc-shuffle-row { display: flex; justify-content: center; gap: 10px; }
.fc-small-btn {
  padding: 10px 18px; border-radius: var(--radius-sm); border: 1px solid var(--border2);
  background: none; color: var(--muted); font-size: 12px; font-weight: 600;
  cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.18s;
  display: flex; align-items: center; gap: 5px; min-height: 44px;
}
.fc-small-btn:active { transform: scale(0.95); }
.fc-small-btn:hover { color: var(--text); border-color: var(--accent); }

/* ── QUIZ ── */
.quiz-start { text-align: center; padding: 4px 0; }
.quiz-start h2 {
  font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; margin-bottom: 6px;
  background: linear-gradient(135deg, var(--text) 0%, var(--text2) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.quiz-start p { color: var(--muted); font-size: 13px; margin-bottom: 16px; }
.start-options { display: flex; flex-direction: column; gap: 9px; max-width: 340px; margin: 0 auto 16px; }
.start-opt-btn {
  padding: 14px 16px; border-radius: var(--radius); border: 1px solid var(--border2);
  background: var(--surface); color: var(--text); text-align: left; cursor: pointer;
  font-family: 'DM Sans', sans-serif; transition: all 0.2s; min-height: 56px;
  position: relative; overflow: hidden;
}
.start-opt-btn::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  background: var(--accent); opacity: 0; transition: opacity 0.2s; border-radius: 3px 0 0 3px;
}
.start-opt-btn:hover { border-color: var(--accent); background: var(--surface2); }
.start-opt-btn:hover::before { opacity: 1; }
.start-opt-btn:active { transform: scale(0.98); }
.start-opt-btn .sot { font-size: 14px; font-weight: 700; display: block; margin-bottom: 3px; }
.start-opt-btn .son { font-size: 11px; color: var(--muted); }
.start-opt-all {
  border-color: var(--accent) !important;
  background: linear-gradient(135deg, rgba(61,142,240,0.1) 0%, rgba(61,142,240,0.05) 100%) !important;
}
.start-opt-all::before { opacity: 1 !important; background: linear-gradient(180deg, var(--accent) 0%, var(--accent2) 100%) !important; }
.start-opt-all .sot { color: var(--accent); }

.quiz-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.quiz-back-btn {
  display: flex; align-items: center; gap: 5px; padding: 7px 12px; border-radius: 20px;
  border: 1px solid var(--border2); background: var(--surface); color: var(--muted);
  font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif;
  transition: all 0.18s; flex-shrink: 0; min-height: 36px;
}
.quiz-back-btn:hover { color: var(--text); border-color: var(--accent); }
.quiz-back-btn:active { transform: scale(0.95); }
.quiz-q-num { font-size: 12px; color: var(--muted); font-weight: 600; flex: 1; text-align: center; }
.quiz-score-chip {
  font-size: 12px; font-weight: 700; color: var(--accent2); background: var(--accent2-glow);
  border: 1px solid rgba(48,212,160,0.2); padding: 4px 12px; border-radius: 20px; flex-shrink: 0;
}
.quiz-progress-bar { height: 3px; background: var(--surface2); border-radius: 4px; margin-bottom: 14px; overflow: hidden; }
.quiz-progress-fill {
  height: 100%; border-radius: 4px;
  background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent));
  background-size: 200% 100%; animation: shimmer 2s linear infinite;
  transition: width 0.4s cubic-bezier(0.4,0,0.2,1); box-shadow: 0 0 8px rgba(61,142,240,0.4);
}
.quiz-card {
  background: linear-gradient(160deg, var(--surface) 0%, var(--surface2) 100%);
  border: 1px solid var(--border2); border-radius: var(--radius); padding: 18px 16px;
  margin-bottom: 12px; box-shadow: var(--shadow);
}
.quiz-type-badge { font-size: 9px; padding: 4px 10px; border-radius: 12px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; }
.quiz-type-badge.tf { background: rgba(240,192,48,0.12); color: var(--yellow); border: 1px solid rgba(240,192,48,0.2); }
.quiz-type-badge.mcq { background: var(--accent-glow); color: var(--accent); border: 1px solid rgba(61,142,240,0.2); }
.quiz-question { font-size: clamp(14px, 3.8vw, 16px); line-height: 1.65; color: var(--text); margin-bottom: 16px; margin-top: 10px; }
.quiz-options { display: flex; flex-direction: column; gap: 9px; }
.quiz-opt {
  padding: 14px; border-radius: var(--radius-sm); border: 1px solid var(--border2);
  background: var(--surface2); color: var(--text); font-size: 15px; font-weight: 400;
  cursor: pointer; text-align: left; transition: all 0.18s; font-family: 'DM Sans', sans-serif;
  line-height: 1.45; display: flex; align-items: flex-start; gap: 10px; min-height: 52px;
}
.quiz-opt:hover { border-color: var(--accent); background: var(--surface3); }
.quiz-opt:active { opacity: 0.85; transform: scale(0.99); }
.quiz-opt.correct { background: rgba(48,212,160,0.1); border-color: var(--green); color: var(--green); box-shadow: 0 0 12px rgba(48,212,160,0.1); }
.quiz-opt.wrong { background: rgba(240,96,96,0.1); border-color: var(--red); color: var(--red); }
.quiz-opt.show-correct { background: rgba(48,212,160,0.07); border-color: var(--green); color: var(--green); }
.quiz-opt .opt-label { font-weight: 700; font-size: 12px; opacity: 0.5; flex-shrink: 0; margin-top: 1px; }
.quiz-opt.correct .opt-label, .quiz-opt.wrong .opt-label, .quiz-opt.show-correct .opt-label { opacity: 1; }
.quiz-opt[disabled] { cursor: default; }

.quiz-explanation {
  margin-top: 12px; padding: 12px 14px; background: var(--accent-glow);
  border: 1px solid rgba(61,142,240,0.18); border-radius: var(--radius-sm);
  font-size: 13px; color: var(--text2); line-height: 1.6; display: none;
  animation: fadeSlideUp 0.3s ease;
}
.quiz-explanation.visible { display: block; }
.quiz-explanation strong { color: var(--accent); }
.quiz-next-btn {
  width: 100%; padding: 15px; border-radius: var(--radius-sm); border: none;
  background: linear-gradient(135deg, var(--accent) 0%, #2a7de0 100%); color: #fff;
  font-size: 16px; font-weight: 700; cursor: pointer; font-family: 'DM Sans', sans-serif;
  min-height: 52px; box-shadow: 0 4px 18px rgba(61,142,240,0.35);
  transition: opacity 0.18s, transform 0.15s; letter-spacing: 0.2px; display: none;
  animation: fadeSlideUp 0.3s ease;
}
.quiz-next-btn.visible { display: block; animation: pulseIn 0.3s ease both; }
.quiz-next-btn:active { transform: scale(0.98); opacity: 0.9; }

.tf-buttons { display: flex; gap: 10px; }
.tf-btn {
  flex: 1; padding: 16px; border-radius: var(--radius-sm); border: 1px solid var(--border2);
  background: var(--surface2); color: var(--text); font-size: 17px; font-weight: 700;
  cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.18s; min-height: 56px;
}
.tf-btn:active { transform: scale(0.97); }
.tf-btn.true-btn:hover { background: rgba(48,212,160,0.1); border-color: var(--green); }
.tf-btn.false-btn:hover { background: rgba(240,96,96,0.1); border-color: var(--red); }
.tf-btn.correct { background: rgba(48,212,160,0.15); border-color: var(--green); color: var(--green); box-shadow: 0 0 12px rgba(48,212,160,0.1); }
.tf-btn.wrong { background: rgba(240,96,96,0.12); border-color: var(--red); color: var(--red); }
.tf-btn[disabled] { cursor: default; }

.quiz-result { display: none; padding: 28px 16px; text-align: center; }
.quiz-result.visible { display: block; }
.result-score {
  font-family: 'Syne', sans-serif; font-size: 68px; font-weight: 800; line-height: 1;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  margin: 14px 0 8px; filter: drop-shadow(0 0 20px rgba(61,142,240,0.2));
}
.quiz-result.visible .result-score { animation: countUp 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.1s both; }
.quiz-result.visible .result-stats { animation: fadeSlideUp 0.4s ease 0.3s both; }
.quiz-result.visible .restart-btn { animation: fadeSlideUp 0.4s ease 0.45s both; }
.result-label { font-size: 14px; color: var(--muted); margin-bottom: 24px; }
.result-stats { display: flex; gap: 10px; justify-content: center; margin-bottom: 28px; }
.stat-chip { padding: 9px 18px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 700; border: 1px solid transparent; }
.stat-chip.green { background: rgba(48,212,160,0.1); color: var(--green); border-color: rgba(48,212,160,0.2); }
.stat-chip.red { background: rgba(240,96,96,0.1); color: var(--red); border-color: rgba(240,96,96,0.2); }
.restart-btn {
  padding: 15px 36px; border-radius: var(--radius-sm); border: none;
  background: linear-gradient(135deg, var(--accent) 0%, #2a7de0 100%); color: #fff;
  font-size: 15px; font-weight: 700; cursor: pointer; font-family: 'DM Sans', sans-serif;
  box-shadow: 0 4px 18px rgba(61,142,240,0.35); min-height: 52px; transition: transform 0.15s;
}
.restart-btn:active { transform: scale(0.97); }

.confirm-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center;
  z-index: 1000; padding: 20px; animation: fadeIn 0.2s ease;
}
.confirm-box {
  background: var(--surface); border: 1px solid var(--border2); border-radius: 20px;
  padding: 28px 24px; max-width: 320px; width: 100%; text-align: center;
  box-shadow: var(--shadow-lg); animation: scaleIn 0.2s cubic-bezier(0.34,1.56,0.64,1);
  transform-origin: center bottom;
}
.confirm-icon { font-size: 36px; margin-bottom: 14px; }
.confirm-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; color: var(--text); margin-bottom: 8px; }
.confirm-msg { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 22px; }
.confirm-msg strong { color: var(--text); }
.confirm-btns { display: flex; gap: 10px; }
.confirm-no {
  flex: 1; padding: 13px; border-radius: var(--radius-sm); border: 1px solid var(--border2);
  background: var(--surface2); color: var(--text); font-size: 14px; font-weight: 600;
  cursor: pointer; font-family: 'DM Sans', sans-serif; min-height: 48px; transition: all 0.18s;
}
.confirm-no:hover { border-color: var(--accent); }
.confirm-yes {
  flex: 1; padding: 13px; border-radius: var(--radius-sm); border: none;
  background: linear-gradient(135deg, var(--red) 0%, #d04040 100%); color: #fff;
  font-size: 14px; font-weight: 700; cursor: pointer; font-family: 'DM Sans', sans-serif;
  min-height: 48px; box-shadow: 0 3px 12px rgba(240,96,96,0.3); transition: transform 0.15s;
}
.confirm-yes:active { transform: scale(0.97); }

.quiz-options .quiz-opt:nth-child(1) { animation: fadeSlideUp 0.2s ease 0.05s both; }
.quiz-options .quiz-opt:nth-child(2) { animation: fadeSlideUp 0.2s ease 0.1s both; }
.quiz-options .quiz-opt:nth-child(3) { animation: fadeSlideUp 0.2s ease 0.15s both; }
.quiz-options .quiz-opt:nth-child(4) { animation: fadeSlideUp 0.2s ease 0.2s both; }
.tf-buttons .tf-btn:nth-child(1) { animation: fadeSlideUp 0.2s ease 0.05s both; }
.tf-buttons .tf-btn:nth-child(2) { animation: fadeSlideUp 0.2s ease 0.1s both; }
.quiz-explanation.visible { animation: fadeSlideUp 0.25s ease both; }

@keyframes fadeSlideUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
@keyframes scaleIn { from { opacity:0; transform:scale(0.85); } to { opacity:1; transform:scale(1); } }
@keyframes shimmer { 0% { background-position:-200% 0; } 100% { background-position:200% 0; } }

</div>

  {cat:'neck_tri',q:'Posterior triangle — 2 sub-triangles?',a:'Divided by INFERIOR BELLY OF OMOHYOID into:\nSUPRACLAVICULAR (LARGER, above) + OCCIPITAL (SMALLER, below).'},
  {cat:'neck_tri',q:'Contents of posterior triangle — 4 categories?',a:'MUSCLE = inf. belly omohyoid.\nVEINS = EJV + subclavian + transverse cervical + suprascapular.\nNERVES = spinal accessory (CN XI), brachial plexus trunks, cutaneous cervical plexus branches.\nARTERIES = transverse cervical, suprascapular, occipital (3rd part), subclavian (3rd part).'},
  {cat:'neck_tri',q:'Anterior triangle — 3 boundaries?',a:'Anteriorly = midline | Posteriorly = ant. border SCM | Superiorly = base of body of mandible.\nRoof = skin, sup. fascia, platysma, investing layer.'},
  {cat:'neck_tri',q:'4 subdivisions of anterior triangle?',a:'Submental | Submandibular (digastric) | Carotid | Muscular.\n(Divided by: digastric + superior belly of omohyoid.)'},
  {cat:'neck_tri',q:'Submental triangle — boundaries, floor, contents?',a:'UNPAIRED. Base = body of hyoid; Apex = symphysis menti; Sides = ant. bellies of digastric. Floor = mylohyoid + raphe. Contents = submental LNs, vessels, N. to mylohyoid, beginning of ant. jugular vein.'},
  {cat:'neck_tri',q:'Submandibular (digastric) triangle — boundaries + contents?',a:'Ant. + post. belly digastric + stylohyoid + base of mandible. Floor = mylohyoid + hyoglossus. Contents = submandibular LNs, facial vessels, submandibular gland, N. to mylohyoid, hypoglossal N. (XII).'},
  {cat:'neck_tri',q:'Carotid triangle — boundaries + contents?',a:'Boundaries: above = post. belly digastric; below = sup. belly omohyoid; post. = ant. border SCM.\nContents: 3 carotid arteries | IJV + tributaries | Last 3 CNs (10,11,12) | 3 small nerves | Deep cervical LNs + cervical symp. chain.'},
  {cat:'neck_tri',q:'Muscular triangle — boundaries + floor?',a:'Anteriorly = midline; above = sup. belly omohyoid; below + post. = ant. border SCM. Floor = infrahyoid muscles. Under floor = thyroid, larynx, trachea, esophagus, parathyroid, pharynx.'},
  {cat:'neck_tri',q:'Midline structures of neck from above downward (10)?',a:'Mylohyoid → Hyoid bone → Thyrohyoid membrane → Thyroid cartilage → Cricothyroid lig. → Cricoid cartilage → Cricothyroid lig. → Trachea (1st ring) → Thyroid gland (isthmus) → Suprasternal notch.'},
  {cat:'neck_tri',q:'Skin innervation of anterolateral neck — 4 nerves?',a:'Transverse cutaneous N. (C2,3) | Supraclavicular N. (C3,4) — 3 branches to 2nd rib | Great auricular N. (C2,3) — angle of mandible + auricle | Lesser occipital N. (C2) — occipital region.'},
];
const HN3_THY = [
  {cat:'neck_thy',q:'Thyroid gland — general description?',a:'Very vascular in MUSCULAR TRIANGLE. 2 lobes + isthmus. Isthmus = front of 2nd, 3rd, 4th tracheal rings. Each lobe = pyramidal/pear-shaped; apex = oblique line of thyroid cartilage; base = 4th/5th tracheal ring.'},
  {cat:'neck_thy',q:'Thyroid — pyramidal lobe?',a:'Projects upward from isthmus, usually to LEFT of midline. Connected to hyoid bone by LEVATOR GLANDULAE THYROIDAE (muscular or fibrous band).'},
  {cat:'neck_thy',q:'Thyroid — 2 capsules?',a:'TRUE capsule = fibrous (directly encloses gland). FALSE capsule = fascial (from pretracheal fascia). VESSELS run BETWEEN the two capsules.'},
  {cat:'neck_thy',q:'Thyroid — anterolateral + medial + posterior relations?',a:'ANTEROLATERAL: SCM, sternohyoid, sternothyroid, omohyoid.\nMEDIAL: trachea, esophagus, larynx, pharynx, recurrent laryngeal N., external laryngeal N.\nPOSTERIOR: carotid sheath (CCA, IJV, vagus); parathyroids + sympathetic chain.'},
  {cat:'neck_thy',q:'Thyroid arterial supply — 3 arteries?',a:'Superior thyroid artery → ECA (ant. aspect).\nInferior thyroid artery → THYROCERVICAL TRUNK (1st part subclavian).\nThyroidae ima artery → ARCH OF AORTA (inconstant; supplies isthmus).'},
  {cat:'neck_thy',q:'Which nerve accompanies each thyroid artery?',a:'SUPERIOR thyroid → EXTERNAL laryngeal nerve (superficial).\nINFERIOR thyroid → related at its end to RECURRENT laryngeal nerve (surgical landmark).'},
  {cat:'neck_thy',q:'Thyroid venous drainage — 3 veins?',a:'Superior thyroid vein → IJV.\nMiddle thyroid vein → IJV.\nInferior thyroid vein → LEFT BRACHIOCEPHALIC vein.'},
  {cat:'neck_thy',q:'Thyroid lymph drainage + nerve supply?',a:'Lymph → mainly deep cervical LNs + few pretracheal (paratracheal) nodes.\nNerve = SYMPATHETIC plexus around arteries (vasomotor, not secretomotor).'},
  {cat:'neck_thy',q:'Parathyroid glands — number, appearance, location?',a:'Usually 4 (2 superior + 2 inferior). Yellowish-brown, ovoid, ~6 mm. Related to POSTERIOR BORDER of each thyroid lobe within the fascial capsule.'},
  {cat:'neck_thy',q:'Parathyroid glands — blood supply?',a:'Supplied by both superior + inferior thyroid arteries, but MAINLY by the INFERIOR thyroid artery.'},
];
const HN3_SAL = [
  {cat:'neck_sal',q:'Submandibular gland — structure (2 parts)?',a:'LARGE SUPERFICIAL PART + SMALL DEEP PART, continuous around POSTERIOR BORDER OF MYLOHYOID.'},
  {cat:'neck_sal',q:'Submandibular duct — description + where it opens?',a:'Arises from DEEP PART. 5 cm long. Runs between mylohyoid (laterally) + hyoglossus (medially). Lingual nerve hooks around the duct. Opens at SUBLINGUAL PAPILLA at sublingual fold (floor of mouth).'},
  {cat:'neck_sal',q:'Submandibular gland — SUPERFICIAL PART: medial relations?',a:'Mylohyoid muscle, nerve + vessels; hyoglossus muscle; hypoglossal nerve; lingual nerve.'},
  {cat:'neck_sal',q:'Submandibular gland — SUPERFICIAL PART: lateral relations?',a:'Submandibular fossa, submandibular LN, skin, fascia, platysma, facial vein, facial nerve (cervical branch). NB: Facial artery = POST. + SUP. aspect.'},
  {cat:'neck_sal',q:'Submandibular gland — DEEP PART relations?',a:'Medially = hyoglossus + styloglossus. Laterally = mylohyoid. Superiorly = lingual nerve + submandibular ganglion. Inferiorly = hypoglossal nerve (CN XII).'},
  {cat:'neck_sal',q:'Submandibular gland — nerve supply?',a:'Sympathetic = plexus around facial + lingual arteries. Parasympathetic = submandibular ganglion (post-ganglionic). Sensory = lingual nerve.'},
  {cat:'neck_sal',q:'Submandibular ganglion — what is it + where?',a:'Small PARASYMPATHETIC ganglion HANGING FROM THE LINGUAL NERVE above mylohyoid. Relations: medially = hyoglossus; superiorly = lingual nerve; inferiorly = SUBMANDIBULAR DUCT.'},
  {cat:'neck_sal',q:'Submandibular ganglion — fibers enter/exit?',a:'PREGANGLIONIC: superior salivary nucleus (pons) → facial N. → chorda tympani → lingual N. → relay here. POST-GANGLIONIC → SM + SL glands.'},
  {cat:'neck_sal',q:'Chorda tympani — what does it carry (2 things)?',a:'1. TASTE fibers from anterior 2/3 of tongue.\n2. PREGANGLIONIC parasympathetic fibers to SM + SL glands.'},
  {cat:'neck_sal',q:'Sublingual gland — position + duct openings?',a:'SMALLEST of 3 salivary glands. Lies beneath MUCOUS MEMBRANE of floor of mouth near midline. Has 8-20 small ducts opening on SUBLINGUAL FOLD.'},
  {cat:'neck_sal',q:'Sublingual gland — 4 relations?',a:'Medial = genioglossus, submandibular duct, lingual nerve. Lateral = SUBLINGUAL FOSSA (mandible). Superior = sublingual fold (mucosa). Inferior = MYLOHYOID MUSCLE.'},
  {cat:'neck_sal',q:'Sublingual gland — nerve supply?',a:'Sympathetic = plexus around arteries. Parasympathetic = submandibular ganglion. Sensory = lingual nerve.'},
  {cat:'neck_sal',q:'Superior salivary nucleus location?',a:'In the PONS. (Inferior salivary nucleus = in the MEDULLA, supplies parotid via CN IX.)'},
];
const HN3_REV = [
  {cat:'neck_rev',q:'TRAP: Thyrohyoid nerve supply?',a:'C1 via branch of HYPOGLOSSAL NERVE. ONLY infrahyoid NOT supplied by ansa cervicalis.'},
  {cat:'neck_rev',q:'TRAP: Inferior thyroid vein drains into?',a:'LEFT BRACHIOCEPHALIC vein. (Superior + middle thyroid veins → IJV.)'},
  {cat:'neck_rev',q:'TRAP: Superior laryngeal artery pierces thyrohyoid membrane with which nerve?',a:'INTERNAL laryngeal nerve (NOT external). External laryngeal nerve accompanies SUPERIOR THYROID ARTERY superficially.'},
  {cat:'neck_rev',q:'TRAP: ICA branches in cervical part?',a:'ICA = ZERO branches in cervical part. ECA = 8 branches.'},
  {cat:'neck_rev',q:'TRAP: Inferior thyroid artery related to which nerve?',a:'RECURRENT LARYNGEAL NERVE (surgically important). NOT the superior thyroid artery.'},
  {cat:'neck_rev',q:'TRAP: Which salivary gland has 8-20 small ducts?',a:'SUBLINGUAL GLAND (8-20 ducts on sublingual fold). Submandibular = ONE duct (Wharton\'s duct).'},
  {cat:'neck_rev',q:'TRAP: Digastric — anterior vs. posterior belly nerve?',a:'ANTERIOR = nerve to mylohyoid (branch of inferior alveolar N.).\nPOSTERIOR = FACIAL NERVE. Different nerves!'},
  {cat:'neck_rev',q:'TRAP: Where is the superior salivary nucleus?',a:'PONS (NOT medulla). Inferior salivary nucleus = medulla (supplies parotid via CN IX).'},
  {cat:'neck_rev',q:'TRAP: Carotid sheath — pretracheal vs. prevertebral?',a:'ANTERIORLY = continuous with PRETRACHEAL fascia. POSTERIORLY = continuous with PREVERTEBRAL fascia.'},
  {cat:'neck_rev',q:'TRAP: Contents of upper vs. lower carotid sheath?',a:'UPPER (above post. belly digastric) = ICA + lower 4 CNs (9,10,11,12). LOWER = CCA + vagus N. only. IJV in BOTH parts posterolaterally.'},
  {cat:'neck_rev',q:'TRAP: Right CCA arises from?',a:'BRACHIOCEPHALIC (innominate) artery. Left CCA from arch of AORTA.'},
  {cat:'neck_rev',q:'TRAP: Pyramidal lobe — connected to + which side?',a:'Connected to hyoid bone by LEVATOR GLANDULAE THYROIDAE. Projects to LEFT of midline.'},
  {cat:'neck_rev',q:'TRAP: Thyroidae ima — present? Parent vessel? Supplies?',a:'NOT ALWAYS PRESENT. Branch of ARCH OF AORTA. Single artery. Supplies the ISTHMUS.'},
  {cat:'neck_rev',q:'TRAP: Lingual nerve relation to submandibular duct?',a:'Lingual nerve passes ABOVE the duct, then HOOKS AROUND it. Duct = INFERIOR relation of submandibular ganglion.'},
  {cat:'neck_rev',q:'TRAP: Submental triangle — paired or unpaired?',a:'UNPAIRED — single midline triangle. ALL other neck triangles are paired.'},
  {cat:'neck_rev',q:'TRAP: Platysma — origin vs. insertion?',a:'ORIGIN = deep fascia of upper pectoralis major + deltoid. INSERTION = base of mandible + angle of mouth.'},
  {cat:'neck_rev',q:'TRAP: EJV — where does it end?',a:'SUBCLAVIAN VEIN just above middle of clavicle. NOT in IJV.'},
  {cat:'neck_rev',q:'TRAP: Motor nerve of the posterior triangle?',a:'SPINAL ACCESSORY NERVE (CN XI) — motor to SCM and trapezius. Cutaneous cervical plexus branches are SENSORY.'},
  {cat:'neck_rev',q:'TRAP: Carotid body vs. sinus?',a:'CAROTID SINUS = BARORECEPTORS (BLOOD PRESSURE). CAROTID BODY = CHEMORECEPTORS (pH and CO2). Both supplied by CN IX.'},
  {cat:'neck_rev',q:'COMPARE: Facial artery branches in neck (4) vs. face (4)?',a:'NECK = ascending palatine, tonsillar, submental, glandular (submandibular).\nFACE = inferior labial, superior labial, lateral nasal, angular (terminal).'},
  {cat:'neck_rev',q:'COMPARE: Genioglossus (superior spine) vs. Geniohyoid (inferior spine)?',a:'GENIOGLOSSUS = FAN-SHAPED, SUPERIOR mental spine → protrusion (CN XII).\nGENIOHYOID = INFERIOR mental spine → elevation of hyoid (C1 via CN XII).'},
  {cat:'neck_rev',q:'COMPARE: Hyoglossus vs. Styloglossus vs. Genioglossus actions?',a:'HYOGLOSSUS = DEPRESSION of tongue.\nSTYLOGLOSSUS = RETRACTION + ELEVATION.\nGENIOGLOSSUS = PROTRUSION.'},
  {cat:'neck_rev',q:'ALL tongue muscles CN XII EXCEPT?',a:'PALATOGLOSSUS = supplied by VAGUS (CN X) via pharyngeal plexus.'},
  {cat:'neck_rev',q:'QUICK RECALL: 4 deep fascia layers + one structure each?',a:'Investing = SCM + trapezius.\nPretracheal = thyroid (false capsule) + strap muscles.\nPrevertebral = scalene muscles.\nCarotid sheath = CCA/ICA, IJV, vagus/CNs 9-12.'},
  {cat:'neck_rev',q:'QUICK RECALL: IJV 6 tributaries?',a:'Inferior petrosal sinus | Pharyngeal veins | Lingual vein | Facial (common facial) vein | Superior thyroid vein | Middle thyroid vein. Mnemonic: "IPLFSM."'},
  {cat:'neck_rev',q:'QUICK RECALL: Ansa cervicalis (C1,2,3) supplies?',a:'ALL infrahyoid EXCEPT thyrohyoid: Sternohyoid, Sternothyroid, Omohyoid. C1 also supplies geniohyoid + thyrohyoid (via CN XII branch).'},
  {cat:'neck_rev',q:'MASTER EXAM TRAPS — Neck Anatomy',a:'Thyrohyoid → C1 via CN XII (NOT ansa)\nInferior thyroid vein → left brachiocephalic (NOT IJV)\nSuperior laryngeal A. → pierces with INTERNAL laryngeal N.\nICA = ZERO branches in neck; ECA = 8\nInferior thyroid A. → related to RECURRENT laryngeal N.\nSublingual = 8-20 ducts; Submandibular = 1 duct\nAnt. belly digastric → nerve to mylohyoid; Post. → facial N.\nSuperior salivary nucleus = PONS\nPyramidal lobe → LEFT of midline\nThyroidae ima → NOT always present → arch of aorta\nSubmental triangle = UNPAIRED\nPlatysma: ORIGIN = pectoralis/deltoid; INSERTION = mandible/mouth\nEJV → SUBCLAVIAN vein (NOT IJV)\nCarotid sinus = BARORECEPTORS; Carotid body = CHEMORECEPTORS'},
];

const HN4_NASAL = [
  {cat:'nasal',q:'Nasal cavity — 4 meatuses/recesses and what each RECEIVES?',a:'INFERIOR MEATUS → NASOLACRIMAL DUCT.\nMIDDLE MEATUS → bulla ethmoidalis (middle ethmoidal) + hiatus semilunaris: ant. ethmoidal + frontal + maxillary sinuses.\nSUPERIOR MEATUS → POST. ETHMOIDAL SINUS.\nSPHENOETHMOIDAL RECESS (above sup. concha) → SPHENOIDAL SINUS.'},
  {cat:'nasal',q:'Nasal septum — 3 parts?',a:'ANTERIOR → SEPTAL CARTILAGE.\nPOSTERO-SUPERIOR → PERPENDICULAR PLATE OF ETHMOID.\nPOSTERO-INFERIOR → VOMER bone.'},
  {cat:'nasal',q:'Nasal cavity ROOF — formed by what, front to back?',a:'Nasal bone → Cribriform plate of ethmoid → Sphenoid body.\nFLOOR = hard palate.'},
  {cat:'nasal',q:'Conchae — which are ethmoid bone, which is separate?',a:'SUPERIOR + MIDDLE conchae = parts of ETHMOID bone.\nINFERIOR concha = SEPARATE BONE (largest; smallest = superior concha).'},
  {cat:'nasal',q:"Kiesselbach's plexus — location + 4 arteries?",a:'Location = ANTERIOR NASAL SEPTUM (medial wall).\n1. Anterior ethmoidal (OPHTHALMIC/ICA)\n2. Sphenopalatine (MAXILLARY)\n3. Greater palatine (MAXILLARY)\n4. Septal br. of superior labial (FACIAL/ECA).'},
  {cat:'nasal',q:'Nasal cavity arterial supply — 3 sources?',a:'1. Ant. + post. ethmoidal arteries → from OPHTHALMIC artery.\n2. GREATER PALATINE + SPHENOPALATINE → from MAXILLARY artery.\n3. Septal br. of SUPERIOR LABIAL → from FACIAL artery.'},
  {cat:'nasal',q:'Nasal cavity lymph drainage — anterior vs. posterior?',a:'ANTERIOR part → SUBMANDIBULAR LN.\nPOSTERIOR part → RETROPHARYNGEAL + UPPER DEEP CERVICAL LN.'},
  {cat:'nasal',q:'Lateral wall of nasal cavity — nerve supply?',a:'SPECIAL (smell) = OLFACTORY nerve.\nGENERAL (V): Ant. ethmoidal N. | Greater palatine N. | Short sphenopalatine N. | Ant. superior alveolar N. (infraorbital branch).'},
  {cat:'nasal',q:'Medial wall (septum) — nerve supply?',a:'SPECIAL = OLFACTORY.\nGENERAL (V): Ant. ethmoidal N. | LONG sphenopalatine N. | Short sphenopalatine N.\nKEY: LONG sph. palatine = SEPTUM; SHORT = LATERAL WALL.'},
  {cat:'nasal',q:'Paranasal sinuses — 4 functions?',a:'1. Decrease skull weight  2. Resonance to voice  3. Warm + humidify air  4. Protect brain against temperature changes.'},
  {cat:'nasal',q:'Middle meatus — 2 key structures within it?',a:'BULLA ETHMOIDALIS = bony elevation receiving middle ethmoidal sinus.\nHIATUS SEMILUNARIS = curved groove BELOW the bulla, receiving: ant. ethmoidal + frontal + maxillary sinuses.'},
  {cat:'nasal',q:"TRAP: Kiesselbach's plexus — which wall?",a:'MEDIAL wall (nasal septum), NOT lateral wall. Located in the ANTERIOR part of the septum.'},
  {cat:'nasal',q:'TRAP: Long vs. short sphenopalatine nerve — which wall?',a:'LONG sphenopalatine → MEDIAL wall (septum).\nSHORT sphenopalatine → LATERAL wall.'},
  {cat:'nasal',q:'TRAP: Which meatus receives sphenoidal sinus?',a:'NONE of the standard 3 meatuses. Drains into SPHENOETHMOIDAL RECESS (above superior concha, below roof of skull).'},
  {cat:'nasal',q:'Nasolacrimal duct significance?',a:'Tears drain: lacrimal sac → nasolacrimal duct → inferior meatus. Explains why nasal secretion increases when crying.'},
  {cat:'nasal',q:'Superior concha — special notes?',a:'SMALLEST concha. Usually FUSES POSTERIORLY with middle concha. Superior + middle = ethmoid. Inferior = separate bone, largest.'},
  {cat:'nasal',q:'Nasal venous drainage?',a:'Corresponds to the arteries (ethmoidal veins → ophthalmic vein; sphenopalatine vein → pterygoid plexus).'},
  {cat:'nasal',q:'MASTER: Nasal meatuses quick recall?',a:'Inferior → nasolacrimal duct only.\nMiddle → ant. ethmoidal + frontal + maxillary + middle ethmoidal.\nSuperior → post. ethmoidal.\nSph.-eth. recess → sphenoidal.\nMnemonic: "I Max My Super Sphere."'},
];
const HN4_PHAR = [
  {cat:'pharynx',q:'Pharynx — definition + extent?',a:'FUNNEL-SHAPED MUSCULAR TUBE. Starts from BASE OF SKULL. Ends at C6 VERTEBRA (becomes ESOPHAGUS). Located behind nasal cavity, oral cavity, and larynx.'},
  {cat:'pharynx',q:'Pharynx wall — 5 layers from inside out?',a:'1. Mucosa  2. Submucosa  3. Pharyngeo-basilar fascia  4. Pharyngeal muscles  5. Bucco-pharyngeal fascia.'},
  {cat:'pharynx',q:'Pharyngeal muscles — 2 groups?',a:'TRANSVERSE (circular) = 3 CONSTRICTORS: superior, middle, inferior.\nLONGITUDINAL = 3 PHARYNGEUS: stylo-pharyngeus, palato-pharyngeus, salpingo-pharyngeus.'},
  {cat:'pharynx',q:'Pharyngeal muscles nerve supply — rule + exception?',a:'ALL pharyngeal muscles = PHARYNGEAL PLEXUS (motor from vagus, CN X).\nEXCEPTION: STYLO-PHARYNGEUS = GLOSSOPHARYNGEAL NERVE (CN IX).'},
  {cat:'pharynx',q:'Pharyngeal plexus — formation?',a:'1. Pharyngeal branches of CN IX (sensory).\n2. Pharyngeal branches of CN X (motor + parasympathetic).\n3. SUPERIOR CERVICAL GANGLION (sympathetic).\nPlexus lies on OUTER SURFACE OF MIDDLE CONSTRICTOR.'},
  {cat:'pharynx',q:'Pharynx arterial supply — 3 sources?',a:'1. Ascending pharyngeal br. of ECA.\n2. Ascending palatine + tonsillar brs. of FACIAL artery.\n3. Pharyngeal brs. of SUPERIOR + INFERIOR THYROID arteries.'},
  {cat:'pharynx',q:'Pharynx venous + lymph drainage?',a:'VENOUS: Pharyngeal plexus of veins → FACIAL VEIN + IJV.\nLYMPH: RETROPHARYNGEAL LNs + DEEP CERVICAL LNs.'},
  {cat:'pharynx',q:'Nasopharynx — 5 features?',a:'1. Nasopharyngeal tonsil (adenoid) on posterior wall.\n2. Opening of EUSTACHIAN TUBE at level of INFERIOR CONCHA.\n3. Tubal elevation (upper + posterior lips of opening).\n4. Salpingo-pharyngeal fold (lower part of tubal elevation).\n5. Pharyngeal recess (fossa of Rosenmuller) — behind salpingo-pharyngeal fold.'},
  {cat:'pharynx',q:"Oropharynx — key features?",a:"Lies behind ORAL CAVITY. Contains PALATINE TONSILS between palatoglossal fold (ant. pillar) + palatopharyngeal fold (post. pillar).\nWith lingual + nasopharyngeal tonsil = WALDEYER'S RING."},
  {cat:'pharynx',q:"Waldeyer's ring — components?",a:"1. Nasopharyngeal tonsil (adenoid) — posterior wall nasopharynx.\n2. 2x Palatine tonsils — oropharynx.\n3. Lingual tonsil — posterior 1/3 of tongue.\n4. 2x Tubal tonsils — around Eustachian tube openings."},
];
const HN4_ORAL = [
  {cat:'oral',q:'Oral cavity — 2 parts + definition of each?',a:'VESTIBULE (labial cavity) = space between GUMS and LIPS + CHEEKS.\nORAL CAVITY PROPER (buccal cavity) = Roof: palate. Floor: tongue + sublingual gland + mylohyoid. Sides: teeth.'},
  {cat:'oral',q:'Hard palate — bones + proportions?',a:'ANTERIOR 3/4 = palatine processes of MAXILLA.\nPOSTERIOR 1/4 = horizontal plate of PALATINE BONE.\nDivided by MEDIAN PALATINE SUTURE (ends anteriorly in INCISIVE FOSSA).'},
  {cat:'oral',q:'Soft palate — structure + muscles?',a:'Formed by: Palatine APONEUROSIS (= aponeurosis of TENSOR PALATI). Muscles: levator palati, tensor palati, palatoglossus, palato-pharyngeus, musculus uvulae.'},
  {cat:'oral',q:'Palate motor nerve supply — rule + exception?',a:'ALL palate muscles = PALATINE PLEXUS (accessory cranial N. through VAGUS, CN X).\nEXCEPTION: TENSOR PALATI = MANDIBULAR NERVE (V3) via nerve to MEDIAL PTERYGOID.'},
  {cat:'oral',q:'Palate sensory nerve supply?',a:'GREATER PALATINE nerve + LESSER PALATINE nerve + LONG SPHENOPALATINE nerve.\n(All branches of maxillary nerve, V2.)'},
  {cat:'oral',q:'TRAP: Which palate muscle NOT supplied by palatine plexus?',a:'TENSOR PALATI — supplied by MANDIBULAR NERVE (V3) via nerve to medial pterygoid. All others = palatine plexus.'},
  {cat:'oral',q:'Palatine aponeurosis — what is it?',a:'= APONEUROSIS OF TENSOR PALATI. Attaches to posterior free border of hard palate. Framework giving attachment to ALL other soft palate muscles.'},
  {cat:'oral',q:'Vestibule vs. Oral cavity proper — alternative names?',a:'VESTIBULE = LABIAL CAVITY.\nORAL CAVITY PROPER = BUCCAL CAVITY.'},
  {cat:'oral',q:'What is at the incisive fossa?',a:'Anterior end of the median palatine suture. Incisive foramen transmits NASOPALATINE NERVE and greater palatine vessels.'},
];
const HN4_TON = [
  {cat:'tongue',q:'Tongue — 4 parts?',a:'ROOT (post. part, mainly in oropharynx) | TIPS + MARGINS | VENTRAL (lower) SURFACE | DORSAL (upper) SURFACE (divided by sulcus terminalis into ant. 2/3 + post. 1/3).'},
  {cat:'tongue',q:'Sulcus terminalis + foramen caecum?',a:'V-SHAPED GROOVE on dorsal surface. Apex directed posteriorly → FORAMEN CAECUM. Divides: ANT. 2/3 = palatine/buccal part (oral cavity); POST. 1/3 = pharyngeal part (oropharynx).'},
  {cat:'tongue',q:'Ventral surface of tongue — 3 features?',a:'1. FRENULUM LINGUAE = raised midline fold.\n2. DEEP LINGUAL VEIN = on each side of midline.\n3. FIMBRIATED FOLD = lateral to deep lingual vein.'},
  {cat:'tongue',q:'Compare ANT 2/3 vs POST 1/3 of tongue?',a:'ANT 2/3: palatine/buccal | oral cavity proper | filiform+fungiform+vallate papillae | no lingual tonsils | 1st pharyngeal arch | lingual N. (general) + chorda tympani (taste).\nPOST 1/3: pharyngeal | oropharynx | NO papillae | lingual tonsils | 3rd pharyngeal arch | CN IX (all sensations).'},
  {cat:'tongue',q:'Tongue papillae — 3 types on anterior 2/3?',a:'FILIFORM = most numerous; NO taste buds; TOUCH/texture.\nFUNGIFORM = scattered; have taste buds.\nVALLATE (circumvallate) = LARGEST; V-shape just ANTERIOR to sulcus terminalis; have taste buds.'},
  {cat:'tongue',q:'Tongue sensory nerve supply — complete summary?',a:'ANT 2/3: TASTE = CHORDA TYMPANI (facial N., CN VII). GENERAL = LINGUAL NERVE (V3, mandibular).\nPOST 1/3: ALL sensation (taste + general) = GLOSSOPHARYNGEAL (CN IX).'},
  {cat:'tongue',q:'Tongue motor nerve supply — rule + exception?',a:'ALL tongue muscles = HYPOGLOSSAL NERVE (CN XII).\nEXCEPTION: PALATOGLOSSUS = PALATINE PLEXUS (cranial accessory N. through VAGUS, CN X).'},
  {cat:'tongue',q:'Intrinsic tongue muscles — function + types?',a:'Change the SHAPE of tongue (NOT position). Inside tongue.\nTypes: Vertical | Transverse | Superior longitudinal | Inferior longitudinal. ALL = CN XII.'},
  {cat:'tongue',q:'Extrinsic tongue muscles — function + 4 muscles?',a:'Change POSITION. ALL CN XII EXCEPT palatoglossus (vagus/CN X).\nGENIOGLOSSUS (fan-shaped) = superior genial tubercle → PROTRUSION.\nHYOGLOSSUS (quadrilateral) = hyoid bone → DEPRESSION.\nSTYLOGLOSSUS = styloid → RETRACTION + ELEVATION.\nPALATOGLOSSUS = palatine aponeurosis → ELEVATION of post. tongue.'},
  {cat:'tongue',q:'Tongue lymph drainage?',a:'ANT 2/3 TIP → SUBMENTAL LN.\nANT 2/3 SIDES → SUBMANDIBULAR → UPPER DEEP CERVICAL LN.\nPOST 1/3 → UPPER DEEP CERVICAL LN.'},
  {cat:'tongue',q:'Blood supply of tongue?',a:'ARTERY = LINGUAL ARTERY (branch of ECA). VEIN = LINGUAL VEIN (→ IJV). Lingual artery accompanies hypoglossal nerve on hyoglossus muscle.'},

  {cat:'tongue',q:'Which papillae have taste buds?',a:'FUNGIFORM (scattered across ant. 2/3) + VALLATE/CIRCUMVALLATE (V-shaped row in front of sulcus terminalis). FILIFORM papillae = NO taste buds (touch only).'},

const HN4_REV = [
  {cat:'npt_rev',q:'MASTER SUMMARY — Nerve supply of tongue?',a:'MOTOR: All = CN XII. EXCEPT palatoglossus = CN X (vagus/palatine plexus).\nSENSORY (general): Ant. 2/3 = lingual N. (V3). Post. 1/3 = CN IX.\nSENSORY (taste): Ant. 2/3 = chorda tympani (VII). Post. 1/3 = CN IX.'},

  const row = document.getElementById('fcFilterRow');
  const filters = FC_FILTERS[fcSheet];
  row.innerHTML = filters.map((f,i) => `<button class="filter-btn${i===0?' active':''}" onclick="setFCFilter('${f.key}')">${f.label}</button>`).join('');
}

function setFCSheet(s) {
  fcSheet = s;
  fcFilter = 'all';
  document.getElementById('fcSheetIntro').classList.toggle('active', s==='intro');
  document.getElementById('fcSheetHN').classList.toggle('active', s==='hn');
  document.getElementById('fcSheetHN3').classList.toggle('active', s==='hn3');
  document.getElementById('fcSheetHN4').classList.toggle('active', s==='hn4');
  renderFCFilters();
  buildDeck();
}

function buildDeck() {
  const source = fcSheet === 'intro' ? INTRO_CARDS : fcSheet === 'hn' ? HN_CARDS : fcSheet === 'hn3' ? HN3_CARDS : HN4_CARDS;
  fcDeck = fcFilter === 'all' ? [...source] : source.filter(c => c.cat === fcFilter);
  fcIndex = 0; fcFlipped = false;
  renderCard();
}

function renderCard() {
  const card = fcDeck[fcIndex];
  document.getElementById('fcCurrent').textContent = fcIndex + 1;
  document.getElementById('fcTotal').textContent = fcDeck.length;
  document.getElementById('fcTag').textContent = CAT_TAGS[card.cat] || card.cat.toUpperCase();
  document.getElementById('fcQuestion').textContent = card.q;
  document.getElementById('fcAnswer').textContent = card.a;
  document.getElementById('fcCard').classList.remove('flipped');
  fcFlipped = false;
}

function flipCard() {
  fcFlipped = !fcFlipped;
  document.getElementById('fcCard').classList.toggle('flipped', fcFlipped);
}
function nextCard() { fcIndex = (fcIndex + 1) % fcDeck.length; renderCard(); }
function prevCard() { fcIndex = (fcIndex - 1 + fcDeck.length) % fcDeck.length; renderCard(); }
function shuffleCards() {
  for (let i = fcDeck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [fcDeck[i], fcDeck[j]] = [fcDeck[j], fcDeck[i]];
  }
  fcIndex = 0; renderCard();
}
function resetCards() { buildDeck(); }
function setFCFilter(f) {
  fcFilter = f;
  document.querySelectorAll('#fcFilterRow .filter-btn').forEach(b => b.classList.remove('active'));
  const filters = FC_FILTERS[fcSheet];
  const idx = filters.findIndex(x => x.key === f);
  if (idx >= 0) document.querySelectorAll('#fcFilterRow .filter-btn')[idx].classList.add('active');
  buildDeck();
}

/* ══════════════════════════════════════════════════
   QUIZ LOGIC
══════════════════════════════════════════════════ */
let quizSheet = 'intro';
let quizDeck = [];
let quizIndex = 0;
let quizCorrect = 0;
let quizAnswered = false;

const QUIZ_TOPICS = {
  intro: [
    {key:'skin', label:'🧴 The Skin', count:'20 questions — MCQ & T/F', data: INTRO_SKIN_QUIZ},
    {key:'muscle', label:'💪 Muscles', count:'6 questions — MCQ & T/F', data: INTRO_MUSCLE_QUIZ},
    {key:'bone', label:'🦴 Bones (by Shape)', count:'12 questions — MCQ & T/F', data: INTRO_BONE_QUIZ},
    {key:'joint', label:'🔩 Synovial Joints', count:'7 questions — MCQ & T/F', data: INTRO_JOINT_QUIZ},
    {key:'all', label:'⚡ All Introduction', count:'All 45 questions combined & shuffled', data: null, all:true},
  ],
  hn: [
    {key:'scalp', label:'🧠 Scalp Region', count:'20 questions — MCQ & T/F', data: HN_SCALP_QUIZ},
    {key:'face', label:'👤 Face Region', count:'5 questions — MCQ & T/F', data: HN_FACE_QUIZ},
    {key:'parotid', label:'🦷 Parotid Gland', count:'12 questions — MCQ & T/F', data: HN_PAROTID_QUIZ},
    {key:'facialN', label:'⚡ Facial Nerve (CN VII)', count:'8 questions — MCQ & T/F', data: HN_FACIALN_QUIZ},
    {key:'mast', label:'💪 Muscles of Mastication', count:'11 questions — MCQ & T/F', data: HN_MAST_QUIZ},
    {key:'maxA', label:'🩸 Maxillary Artery', count:'10 questions — MCQ & T/F', data: HN_MAXA_QUIZ},
    {key:'v3', label:'🔬 Mandibular Nerve V3', count:'9 questions — MCQ & T/F', data: HN_V3_QUIZ},
    {key:'dev', label:'🌱 Development of Face', count:'5 questions — MCQ & T/F', data: HN_DEV_QUIZ},
    {key:'all', label:'⚡ All Head & Neck', count:'All 80 questions combined & shuffled', data: null, all:true},
  ],
  hn3: [
    {key:'muscles', label:'💪 Neck Muscles', count:'MCQ & T/F', data: HN3_MUSCLES_QUIZ},
    {key:'vessels', label:'🩸 Vessels & Fascia', count:'MCQ & T/F', data: HN3_VESSELS_QUIZ},
    {key:'triangles', label:'📐 Triangles', count:'MCQ & T/F', data: HN3_TRIANGLES_QUIZ},
    {key:'thyroid', label:'🦋 Thyroid & Salivary', count:'MCQ & T/F', data: HN3_THYROID_QUIZ},
    {key:'all', label:'⚡ All Neck P3', count:'All 95 questions combined & shuffled', data: null, all:true},
  ],
  hn4: [
    {key:'nasal', label:'👃 Nasal Cavity', count:'MCQ & T/F', data: HN4_NASAL_QUIZ},
    {key:'pharynx', label:'🫁 Pharynx & Oral', count:'MCQ & T/F', data: HN4_PHARYNX_QUIZ},
    {key:'tongue', label:'👅 Tongue', count:'MCQ & T/F', data: HN4_TONGUE_QUIZ},
    {key:'all', label:'⚡ All Neck P4', count:'All 60 questions combined & shuffled', data: null, all:true},
  ]
};

function setQuizSheet(s) {
  quizSheet = s;
  document.getElementById('qSheetIntro').classList.toggle('active', s==='intro');
  document.getElementById('qSheetHN').classList.toggle('active', s==='hn');
  document.getElementById('qSheetHN3').classList.toggle('active', s==='hn3');
  document.getElementById('qSheetHN4').classList.toggle('active', s==='hn4');
  renderQuizTopics();
}

function renderQuizTopics() {
  const topics = QUIZ_TOPICS[quizSheet] || QUIZ_TOPICS['intro'];
  const container = document.getElementById('quizTopicButtons');
  container.innerHTML = topics.map(t =>
    `<button class="start-opt-btn${t.all?' start-opt-all':''}" onclick="startQuiz('${t.key}')">
      <span class="sot">${t.label}</span>
      <span class="son">${t.count}</span>
    </button>`
  ).join('');
}

function startQuiz(key) {
  const topics = QUIZ_TOPICS[quizSheet] || QUIZ_TOPICS['intro'];
  if (key === 'all') {
    const allData = topics.filter(t => !t.all).flatMap(t => t.data);
    quizDeck = [...allData];
  } else {
    const topic = topics.find(t => t.key === key);
    quizDeck = [...topic.data];
  }
  for (let i = quizDeck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [quizDeck[i], quizDeck[j]] = [quizDeck[j], quizDeck[i]];
  }
  quizIndex = 0; quizCorrect = 0; quizAnswered = false;
  document.getElementById('quizStart').style.display = 'none';
  document.getElementById('quizResult').classList.remove('visible');
  document.getElementById('quizActive').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  const q = quizDeck[quizIndex];
  quizAnswered = false;
  document.getElementById('qNum').textContent = `Q${quizIndex + 1} / ${quizDeck.length}`;
  document.getElementById('qScore').textContent = `✓ ${quizCorrect}`;
  document.getElementById('qProgress').style.width = `${(quizIndex / quizDeck.length) * 100}%`;
  const badge = document.getElementById('qTypeBadge');
  badge.className = 'quiz-type-badge ' + q.type;
  badge.textContent = q.type === 'tf' ? 'TRUE / FALSE' : 'MCQ';
  document.getElementById('qQuestion').textContent = q.q;
  document.getElementById('qExplanation').classList.remove('visible');
  document.getElementById('qNextBtn').classList.remove('visible');
  const optsEl = document.getElementById('qOptions');
  optsEl.innerHTML = '';
  if (q.type === 'tf') {
    const div = document.createElement('div');
    div.className = 'tf-buttons';
    const tBtn = document.createElement('button');
    tBtn.className = 'tf-btn true-btn'; tBtn.textContent = '✓ TRUE';
    const fBtn = document.createElement('button');
    fBtn.className = 'tf-btn false-btn'; fBtn.textContent = '✗ FALSE';
    tBtn.onclick = () => answerTF(true, tBtn, fBtn, q);
    fBtn.onclick = () => answerTF(false, tBtn, fBtn, q);
    div.appendChild(tBtn); div.appendChild(fBtn);
    optsEl.appendChild(div);
  } else {
    const labels = ['A','B','C','D'];
    const btns = [];
    q.opts.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'quiz-opt';
      btn.innerHTML = `<span class="opt-label">${labels[i]}</span><span>${opt}</span>`;
      btn.onclick = () => answerMCQ(i, btns, q);
      optsEl.appendChild(btn); btns.push(btn);
    });
  }
}

function answerTF(chosen, tBtn, fBtn, q) {
  if (quizAnswered) return;
  quizAnswered = true;
  const isCorrect = chosen === q.ans;
  if (isCorrect) quizCorrect++;
  tBtn.disabled = true; fBtn.disabled = true;
  if (chosen === true) {
    tBtn.classList.add(isCorrect ? 'correct' : 'wrong');
    if (!isCorrect) fBtn.classList.add('correct');
  } else {
    fBtn.classList.add(isCorrect ? 'correct' : 'wrong');
    if (!isCorrect) tBtn.classList.add('correct');
  }
  showExplanation(isCorrect, q.exp);
}

function answerMCQ(chosen, btns, q) {
  if (quizAnswered) return;
  quizAnswered = true;
  const isCorrect = chosen === q.ans;
  if (isCorrect) quizCorrect++;
  btns.forEach((b, i) => {
    b.disabled = true;
    if (i === chosen && isCorrect) b.classList.add('correct');
    else if (i === chosen && !isCorrect) b.classList.add('wrong');
    else if (i === q.ans) b.classList.add('show-correct');
  });
  showExplanation(isCorrect, q.exp);
}

function showExplanation(correct, text) {
  const el = document.getElementById('qExplanation');
  el.innerHTML = `<strong>${correct ? '✓ Correct!' : '✗ Incorrect'}</strong> — ${text}`;
  el.classList.add('visible');
  document.getElementById('qNextBtn').textContent = quizIndex + 1 < quizDeck.length ? 'Next Question →' : 'See Results';
  document.getElementById('qNextBtn').classList.add('visible');
  document.getElementById('qScore').textContent = `✓ ${quizCorrect}`;
}

function nextQuestion() {
  quizIndex++;
  if (quizIndex >= quizDeck.length) showResult();
  else { renderQuestion(); document.querySelector('.main').scrollTop = 0; }
}

function showResult() {
  document.getElementById('quizActive').style.display = 'none';
  const result = document.getElementById('quizResult');
  result.classList.add('visible');
  const pct = Math.round((quizCorrect / quizDeck.length) * 100);
  document.getElementById('rScore').textContent = pct + '%';
  document.getElementById('rCorrect').textContent = `✓ ${quizCorrect} Correct`;
  document.getElementById('rWrong').textContent = `✗ ${quizDeck.length - quizCorrect} Wrong`;
  const labels = ["Excellent! You're ready for the exam 🎯","Good work — review the missed questions 📖","Keep studying — you're getting there 💪","Review the material and try again 🔁"];
  document.getElementById('rLabel').textContent = labels[pct>=90?0:pct>=75?1:pct>=60?2:3];
}

function restartQuiz() {
  document.getElementById('quizResult').classList.remove('visible');
  document.getElementById('quizStart').style.display = 'block';
  document.querySelector('.main').scrollTop = 0;
}

function quizBack() {
  if (quizIndex === 0 && !quizAnswered) exitToMenu();
  else {
    document.getElementById('confirmCount').textContent = quizAnswered ? quizIndex + 1 : quizIndex;
    document.getElementById('confirmModal').style.display = 'flex';
  }
}
function exitToMenu() {
  document.getElementById('quizActive').style.display = 'none';
  document.getElementById('quizResult').classList.remove('visible');
  document.getElementById('quizStart').style.display = 'block';
  document.querySelector('.main').scrollTop = 0;
}
function closeConfirmModal() { document.getElementById('confirmModal').style.display = 'none'; }
function closeConfirm(e) { if (e.target === document.getElementById('confirmModal')) closeConfirmModal(); }
function confirmExit() { closeConfirmModal(); exitToMenu(); }

/* ══════════════════════════════════════════════════
   NAVIGATION
══════════════════════════════════════════════════ */
function showSection(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.navbtn').forEach(b => b.classList.remove('active'));
  document.getElementById('section-' + id).classList.add('active');
  document.getElementById('nav-' + id).classList.add('active');
  document.querySelector('.main').scrollTop = 0;
  document.getElementById('sectionBadge').textContent = {fc:'Flash Cards', quiz:'Quiz'}[id];
}

/* ── INIT ── */
renderFCFilters();
buildDeck();
renderQuizTopics();
</script>
